name: NetMCP Test Suite

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  test:
    name: Run All Tools Test
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies (workspaces)
        run: npm install
      
      - name: Download OUI database (if needed)
        run: |
          cd packages/oui-lookup
          if [ ! -f data/oui.json ]; then
            echo "OUI database not found, downloading..."
            npm run update-db
          else
            echo "✅ OUI database already cached in git"
          fi
          cd ../..
      
      - name: Run smoke tests
        run: |
          chmod +x test-all.sh
          bash test-all.sh
        env:
          CI: true
      
      - name: Run integration tests
        run: |
          chmod +x test-integration.sh
          bash test-integration.sh
        env:
          CI: true
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            test-results.txt
            test-*.log
          retention-days: 7

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run ESLint
        run: npm run lint
        
      - name: Check for TODO/FIXME comments
        run: |
          echo "Checking for TODO/FIXME comments..."
          grep -r "TODO\|FIXME" packages/*/src/ || echo "No TODOs found"
          
          echo "Code quality checks passed!"
