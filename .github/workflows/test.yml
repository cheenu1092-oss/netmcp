name: NetMCP Test Suite

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  test:
    name: Run All Tools Test
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies (workspaces)
        run: npm install
      
      - name: Download OUI database
        run: |
          cd packages/oui-lookup
          npm run update-db
          cd ../..
      
      - name: Run test suite
        run: |
          chmod +x test-all.sh
          bash test-all.sh
        env:
          CI: true
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            test-results.txt
            test-*.log
          retention-days: 7

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Check for common issues
        run: |
          echo "Checking for TODO/FIXME comments..."
          grep -r "TODO\|FIXME" packages/*/src/ || echo "No TODOs found"
          
          echo "Checking for console.log in production code..."
          ! grep -r "console\\.log" packages/*/src/*.js | grep -v "// " || {
            echo "WARNING: Found console.log statements in production code"
            exit 1
          }
          
          echo "Code quality checks passed!"
